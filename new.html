    <head>
        <style>

                width: 400px;
                box-shadow: black 10px 10px 10px;
                border-radius: 50px;
                margin: auto;
                margin-bottom: 30px;
                h2{
                    color: aqua;
                }
            }
        </style>
    </head>
    <body>
        <div class="city">
            <h2 align="center">London</h2>

        </div>
        <div class="city">

        </div>
    </body>
</html>
