<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body{
            font-family: Arial;
            background-color: white;
            padding: 20px;
    }
 h1{
            text-align: center;

        }
        .container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 100px 100px 100px;

            gap: 10px;
            row-gap: 15px;
            column-gap: 20px;

            justify-items: center;
            align-items: center;

            background-color: rgba(170, 162, 162, 0.363);
            padding: 20px;
            border-radius: 10px;

        }
         .box{
            background-color:rgb(115, 33, 209);
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border-radius: 10px;
            box-shadow: 10px 10px 10px;

        }
        .box1{
            grid-column: 1/3;
            background-color:rgb(136, 107, 107);

        }
        .box2{
            grid-row: 2/4;
            background-color:rgb(180, 156, 156);
        }




    </style>
</head>
<body>
    <h1>Photo Gallery</h1>
    <div class="container">

        <div class="box">Nature</div>
        <div class="box">Mountains</div>
        <div class="box">Beach</div>
        <div class="box">Forests</div>
        <div class="box">city</div>
        <div class="box">Flowers</div>
    </div>
</body>
</html>
