<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .box{
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 220px;
            padding: 15px;
            border: 1px solid #000;
            border-radius: 20px;
            background-color: white;
            box-shadow: 10px 10px 10px rgba(0,0,0,0.3);
        }

        .box img{
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        .box h3{
            margin: 15px 0 10px;
        }

        .box p{
            text-align: center;
            margin-bottom: 20px;
        }

        .box input[type="button"]{
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .box input[type="button"]:hover{
            background-color: #0056b3;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="box">
            <img src="download6.png" alt="HTML Course">
            <h3>HTML Course</h3>
            <p>Learn basic HTML</p>
            <input type="button" value="Enroll">
        </div>

        <div class="box">
            <img src="download7.png" alt="CSS Course">
            <h3>CSS Course</h3>
            <p>Learn basic CSS</p>
            <input type="button" value="Enroll">
        </div>

        <div class="box">
            <img src="download8.png" alt="Java Course">
            <h3>Java Course</h3>
            <p>Learn basic Java</p>
            <input type="button" value="Enroll">
        </div>

    </div>

</body>
</html>
