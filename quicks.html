<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
            background: white;
            text-align: center;
            padding-top:80px;
        }
        h1{
            color: black;
            margin-bottom: 40px;
        
        }
        .links{
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .links a{
            text-decoration: none;
            background: linear-gradient(to right,tomato,red);
            color: white;

            padding: 18px 35px;
            border-radius: 50px;

            font-size: 20px;
            font-weight: bold;

            transition: 0.4s;
            box-shadow: 0px 4px 10px gray;
        }
        
        .links hover{
            transform: translateY(-8px);
            background: linear-gradient(to right,tomato,blue);
        }
    </style>
</head>
<body>
    <h1>Welcome to my website</h1>
    <div class="links">
        <a href="chrome://newtab/">Google</a>
        <a href="https://web.whatsapp.com/">Whatsapp</a>
        <a href="https://www.instagram.com/">Instagram</a>
        <a href="https://x.com/">X</a>
        <a href="https://github.com/">GitHUB</a>

    </div>
</body>
</html>
