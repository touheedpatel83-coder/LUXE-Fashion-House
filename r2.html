<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial;
        }
        .container{
            display: flex;
            flex-wrap: wrap;
        }
        .product{
            background: rgb(219, 94, 11);
            margin: 10px;
            padding: 20px;
            text-align: center;
            flex: 100%;
        }
        @media(min-width:600px){
            .product{
                flex:45%
            }
        }
        @media(min-width:900px){
            .product{
                flex:30%
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="product">Product1</div>
        <div class="product">Product2</div>
        <div class="product">Product3</div>
    </div>
</body>
</html>
