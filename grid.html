<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Componenets</title>
    <style>
        body{
            font-family: Arial;
            background-color: white;
            padding: 20px;

        }
        h1{
            text-align: center;

        }
        .container{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 100px 100px 100px;

            gap: 10px;
            row-gap: 15px;
            column-gap: 20px;

            justify-items: center;
            align-items: center;

            background-color: white;
            padding: 20px;
            border-radius: 10px;

        }
        .box{
            background-color: green;
            color: white;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            border-radius: 5px;

        }
        .box1{
            grid-column: 1/3;
            background-color: orange;

        }
        .box4{
            grid-row: 2/4;
            background-color:rgb(95, 14, 245) ;

        }
    </style>
</head>
<body>
    <h1>CSS grid components Example</h1>
    <div class="container">
        <div class="box box1">grid-column</div>
        <div class="box">2</div>
        <div class="box box4">grid row</div>
        <div class="box">5</div>
        <div class="box">6</div>
        <div class="box">7</div>
    </div>
    
</body>
</html>
