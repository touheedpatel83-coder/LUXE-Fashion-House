<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction:row;
            height: 200px;
            align-items: center;
            background-color: lightgray;
        }

        .box{
            background-color: teal;
            color: white;
            padding: 20px;
            margin: 10px;
            width: 90px;
            border: 5px solid black;
        }
    </style>
</head>
<body>
    BASIC  FLEX<br>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
        <div class="box">5</div>
        </div>
    </div>
    
</body>
</html>
